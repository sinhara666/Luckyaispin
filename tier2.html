<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Roller - Tier II</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0e12;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .nav-links {
            margin-bottom: 24px;
            font-size: 14px;
        }

        .nav-links a {
            color: #b026ff;
            margin: 0 12px;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links a.active {
            text-decoration: underline;
            font-weight: bold;
        }

        /* Shifted container border to match the neon theme */
        .container {
            background: #130f1c;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a1f3d;
        }

        .header-desc {
            font-size: 13px;
            color: #a197b3;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .tier-badge {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7209b7;
            margin-bottom: 4px;
            font-weight: 600;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 2px;
            color: #b026ff;
        }

        .price-tag {
            font-size: 14px;
            font-weight: 700;
            color: #f72585;
            margin-bottom: 24px;
        }

        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 28px auto;
        }

        /* Match pointer color to the new theme accent */
        .pointer {
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 14px solid #b026ff;
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Cyber neon gradient button styling */
        .spin-button {
            background: linear-gradient(180deg, #b026ff 0%, #7209b7 100%);
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            border: none;
            border-radius: 25px;
            width: 160px;
            height: 46px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(176, 38, 255, 0.3);
            outline: none;
        }

        .spin-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="nav-links">
        <a href="index.html">All Wheels</a> | 
        <a href="tier1.html">Starter</a> | 
        <a href="tier2.html" class="active">High Roller</a>
    </div>

    <div class="container">
        <div class="header-desc">
            $35 a spin. Land the electric core quadrant to automatically unlock your premium vault pass.
        </div>

        <div class="tier-badge">Tier II</div>
        <h1>HIGH ROLLER</h1>
        <div class="price-tag">$35 · per spin</div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="tier2Canvas" width="560" height="560"></canvas>
        </div>

        <button class="spin-button" id="tier2Btn" onclick="spinWheel()">SPIN</button>
    </div>

    <script src="theme.js"></script>
    <script>
        // Unique Cyber Neon theme setup sent straight into the rendering engine
        const tier2Theme = {
            outer:  ['#3a0ca3', '#7209b7', '#f72585', '#4cc9f0'], // Deep Violet, Purple, Neon Pink, Cyan
            middle: ['#3a0ca3', '#7209b7', '#f72585', '#4cc9f0'],
            inner:  ['#b026ff', '#7209b7', '#f72585', '#4cc9f0'], // Top winning quadrant is Bright Neon Violet
            centerBall: '#b026ff',
            borders: '#130f1c'
        };

        document.addEventListener("DOMContentLoaded", () => {
            initWheel('tier2Canvas', 'tier2Btn', tier2Theme);
        });
    </script>
</body>
</html>
