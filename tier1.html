<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starter Spin - Tier I</title>
    <style>
        body { background-color: #0d0e12; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .nav-links { margin-bottom: 24px; display: flex; gap: 16px; }
        .nav-links a { color: #6c6f7d; text-decoration: none; font-size: 14px; font-weight: bold; }
        .nav-links a.active { color: #f3c641; border-bottom: 2px solid #f3c641; padding-bottom: 2px; }
        .container { background: #15161c; border-radius: 24px; width: 100%; max-width: 380px; padding: 24px; text-align: center; border: 1px solid #22242d; }
        .header-desc { font-size: 13px; color: #8a8d98; margin-bottom: 24px; line-height: 1.5; }
        .tier-badge { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #6c6f7d; font-weight: 600; }
        h1 { font-size: 28px; margin: 4px 0 2px 0; letter-spacing: 1px; }
        .price-tag { font-size: 14px; color: #f3c641; font-weight: bold; margin-bottom: 24px; }
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 0 auto 28px auto; }
        .pointer { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 14px solid #f3c641; z-index: 10; }
        canvas { width: 100%; height: 100%; }
        .spin-button { background: linear-gradient(180deg, #f4c742, #caa125); color: #000; font-size: 16px; font-weight: bold; border: none; border-radius: 25px; width: 160px; height: 46px; cursor: pointer; box-shadow: 0 6px 20px rgba(244, 199, 66, 0.25); }
    </style>
</head>
<body>

    <div class="nav-links">
        <a href="tier1.html" class="active">Starter</a>
        <a href="tier2.html">High Roller</a>
        <a href="tier3.html">Jackpot</a>
    </div>

    <div class="container">
        <div class="header-desc">Three tiers. Four sections per wheel. Land gold, spin again for free — anything else pops your prize vault.</div>
        <div class="tier-badge">Tier I</div>
        <h1>STARTER</h1>
        <div class="price-tag">$15 · Play</div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="canvasT1" width="560" height="560"></canvas>
        </div>

        <button class="spin-button" id="btnT1" onclick="spinWheel()">SPIN</button>
    </div>

    <script src="theme.js"></script>
    <script>document.addEventListener("DOMContentLoaded", () => initWheel('canvasT1', 'btnT1'));</script>
</body>
</html>
